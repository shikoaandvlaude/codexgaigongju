id: redis-unauthorized-access

info:
  name: Redis - Unauthorized Access (未授权访问)
  author: bai-codeagent
  severity: critical
  description: |
    Redis 未设置密码或使用弱密码，可直接连接执行任意命令。
    可导致：写入webshell、写入SSH公钥、写入crontab反弹shell等。
  tags: redis,unauth,cn-cms
  metadata:
    cnvd-applicable: true
    port: 6379

network:
  - inputs:
      - data: "INFO\r\n"
    host:
      - "{{Hostname}}"
      - "{{Host}}:6379"
    read-size: 2048
    matchers:
      - type: word
        words:
          - "redis_version"
          - "connected_clients"
        condition: or

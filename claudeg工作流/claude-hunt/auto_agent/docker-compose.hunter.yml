version: "3.8"

services:
  # 自动化漏洞猎人Agent
  hunter:
    build:
      context: .
      dockerfile: Dockerfile.hunter
    volumes:
      - ./config.yaml:/app/auto_agent/config.yaml
      - ~/.bai-agent:/root/.bai-agent
      - ./output:/app/output
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    network_mode: host
    stdin_open: true
    tty: true

  # Web面板 (可选，使用 --profile full 启动)
  panel:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_API_KEY=${DEEPSEEK_API_KEY:-}
    profiles:
      - full

rules:
  - id: anthropic-missing-system-prompt-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Anthropic messages.create() called without a 'system' parameter. A system
      prompt helps set behavioral guidelines and safety boundaries for the model.
    metadata:
      cwe: "CWE-1188: Initialization with an Insecure Default"
      category: security
      subcategory: [audit]
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: HIGH
      technology: [anthropic]
      references:
        - https://docs.anthropic.com/en/api/messages
    patterns:
      - pattern: "$CLIENT.messages.create({...})"
      - pattern-not: "$CLIENT.messages.create({..., system: $SYS, ...})"

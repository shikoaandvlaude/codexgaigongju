rules:
  - id: huggingface-hardcoded-api-key-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Hugging Face API token is hardcoded in source code. Use environment
      variables or a secrets manager instead. See
      https://huggingface.co/docs/hub/en/security-tokens
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      subcategory: [vuln]
      likelihood: HIGH
      impact: MEDIUM
      confidence: HIGH
      technology: [huggingface]
      references:
        - https://huggingface.co/docs/hub/en/security-tokens
    patterns:
      - pattern: new InferenceClient("$KEY", ...)
      - metavariable-regex:
          metavariable: $KEY
          regex: ^hf_

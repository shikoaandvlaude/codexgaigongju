rules:
  - id: hooks-no-input-validation-python
    languages: [python]
    severity: WARNING
    message: >-
      Claude Code and Cursor hook reads stdin without input validation. Wrap json.loads/json.load
      calls in try/except to handle malformed or unexpected input gracefully.
    metadata:
      cwe: "CWE-1287: Improper Validation of Specified Type of Input"
      category: security
      subcategory: [audit]
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: MEDIUM
      technology: [claude-code, cursor]
      references:
        - https://docs.anthropic.com/en/docs/claude-code/hooks
        - https://cursor.com/docs/agent/hooks
    patterns:
      - pattern-either:
          - pattern: json.loads(sys.stdin.read())
          - pattern: json.load(sys.stdin)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...

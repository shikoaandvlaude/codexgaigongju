rules:
  - id: llm-output-to-exec-python
    mode: taint
    languages: [python]
    severity: ERROR
    message: >-
      LLM API response data flows into a dangerous code execution function
      (eval, exec, subprocess, os.system). This enables code injection attacks
      where a compromised or manipulated LLM response can execute arbitrary code
      on the host system. Validate and sandbox LLM outputs before execution.
    metadata:
      cwe: "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      category: security
      confidence: HIGH
      subcategory: [vuln]
      likelihood: MEDIUM
      impact: HIGH
      technology: [openai, anthropic, gemini]
      references:
        - https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
    pattern-sources:
      - pattern: $CLIENT.chat.completions.create(...)
      - pattern: $CLIENT.messages.create(...)
      - pattern: $MODEL.generate_content(...)
      - pattern: $CLIENT.chat(...)
    pattern-sinks:
      - patterns:
          - pattern: eval($SINK)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: exec($SINK)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: subprocess.run($SINK, ..., shell=True)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: subprocess.call($SINK, ..., shell=True)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: subprocess.Popen($SINK, ..., shell=True)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: os.system($SINK)
          - focus-metavariable: $SINK

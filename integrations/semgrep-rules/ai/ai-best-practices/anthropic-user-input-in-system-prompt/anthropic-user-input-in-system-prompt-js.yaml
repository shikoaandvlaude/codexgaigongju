rules:
  - id: anthropic-user-input-in-system-prompt-js
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      User input flows into the Anthropic system prompt. This enables prompt
      injection attacks where users can override system instructions. Validate
      and sanitize user input, or keep system prompts hardcoded.
    metadata:
      cwe: "CWE-77: Command Injection"
      category: security
      confidence: MEDIUM
      subcategory: [vuln]
      likelihood: MEDIUM
      impact: HIGH
      technology: [anthropic]
      references:
        - https://docs.anthropic.com/en/docs/initial-setup
    pattern-sources:
      - pattern: req.body.$F
      - pattern: req.query.$F
      - pattern: req.params.$F
      - pattern: req.body
    pattern-sinks:
      - patterns:
          - pattern: |
              $CLIENT.messages.create({..., system: $SINK, ...})
          - focus-metavariable: $SINK

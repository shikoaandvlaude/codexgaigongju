rules:
  - id: gemini-hardcoded-api-key-java
    languages: [java]
    severity: ERROR
    message: >-
      Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      subcategory: [vuln]
      likelihood: HIGH
      impact: MEDIUM
      confidence: HIGH
      technology: [gemini, google]
      references:
        - https://ai.google.dev/gemini-api/docs/api-key
    patterns:
      - pattern: $OBJ.apiKey("$KEY")
      - metavariable-regex:
          metavariable: $KEY
          regex: ^AIza

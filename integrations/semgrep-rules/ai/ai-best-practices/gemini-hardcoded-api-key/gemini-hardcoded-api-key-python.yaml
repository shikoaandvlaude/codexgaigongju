rules:
  - id: gemini-hardcoded-api-key-python
    languages: [python]
    severity: ERROR
    message: >-
      Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      subcategory: [vuln]
      likelihood: HIGH
      impact: MEDIUM
      confidence: HIGH
      technology: [gemini, google]
      references:
        - https://ai.google.dev/gemini-api/docs/api-key
    pattern-either:
      - patterns:
          - pattern: genai.configure(api_key="$KEY", ...)
          - metavariable-regex:
              metavariable: $KEY
              regex: ^AIza
      - patterns:
          - pattern: genai.Client(api_key="$KEY", ...)
          - metavariable-regex:
              metavariable: $KEY
              regex: ^AIza
      - patterns:
          - pattern: $MOD.Client(api_key="$KEY", ...)
          - metavariable-regex:
              metavariable: $KEY
              regex: ^AIza
          - metavariable-regex:
              metavariable: $MOD
              regex: genai

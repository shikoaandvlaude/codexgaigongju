rules:
  - id: hooks-path-traversal-bash
    mode: taint
    languages: [bash]
    severity: ERROR
    message: >-
      Hook input flows into a file path without validation. Claude Code and Cursor hooks
      receive JSON input that may contain user-controlled paths. An attacker
      could craft input with path traversal sequences (e.g., '../../etc/passwd')
      to read, modify, or delete arbitrary files. Use realpath or readlink -f
      to resolve and validate paths before file operations.
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      category: security
      confidence: MEDIUM
      subcategory: [vuln]
      likelihood: MEDIUM
      impact: HIGH
      technology: [claude-code, cursor]
      references:
        - https://docs.anthropic.com/en/docs/claude-code/hooks
        - https://cursor.com/docs/agent/hooks
    pattern-sources:
      - pattern: |
          $VAR=$(... | jq ...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: cat $SINK
              - pattern: rm $SINK
              - pattern: cp $SINK ...
              - pattern: mv $SINK ...
          - pattern-not-inside: |
              $X=$(... | jq ...)
    pattern-sanitizers:
      - pattern: realpath ...
      - pattern: readlink -f ...

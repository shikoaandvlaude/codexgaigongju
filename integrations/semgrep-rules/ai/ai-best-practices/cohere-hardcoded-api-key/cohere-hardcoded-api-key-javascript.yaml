rules:
  - id: cohere-hardcoded-api-key-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      subcategory: [vuln]
      likelihood: HIGH
      impact: MEDIUM
      confidence: HIGH
      technology: [cohere]
      references:
        - https://docs.cohere.com/reference/about
    pattern: |
      new CohereClient({token: "$KEY", ...})

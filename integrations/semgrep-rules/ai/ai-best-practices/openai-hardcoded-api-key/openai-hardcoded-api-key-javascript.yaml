rules:
  - id: openai-hardcoded-api-key-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      subcategory: [vuln]
      likelihood: HIGH
      impact: MEDIUM
      confidence: HIGH
      technology: [openai]
      references:
        - https://help.openai.com/en/articles/5112595-best-practices-for-api-key-safety
    patterns:
      - pattern: |
          new OpenAI({apiKey: "$KEY", ...})
      - metavariable-regex:
          metavariable: $KEY
          regex: ^sk-

rules:
  - id: cohere-missing-safety-mode-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Cohere chat called without explicit 'safety_mode' parameter. Set
      safetyMode to 'STRICT' or 'CONTEXTUAL' to explicitly configure content
      safety guardrails. See https://docs.cohere.com/docs/safety-modes
    metadata:
      cwe: "CWE-1188: Initialization with an Insecure Default"
      category: security
      subcategory: [audit]
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: HIGH
      technology: [cohere]
      references:
        - https://docs.cohere.com/docs/safety-modes
    patterns:
      - pattern: "$CLIENT.chat({...})"
      - pattern-not: "$CLIENT.chat({..., safetyMode: $SM, ...})"
      - pattern-inside: |
          $CLIENT = new CohereClient(...)
          ...

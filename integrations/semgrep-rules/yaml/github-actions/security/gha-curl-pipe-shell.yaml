rules:
- id: gha-curl-pipe-shell
  languages:
  - yaml
  message: >-
    A `run:` step pipes the output of `curl` or `wget` directly into a shell interpreter.
    This is the "curl | bash" install pattern — if the remote server is compromised or the
    URL is hijacked, an attacker can execute arbitrary code in your CI runner. Consider
    downloading the file first, verifying its checksum or signature, and then executing it.
  metadata:
    category: security
    cwe:
    - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    owasp:
    - A03:2021 - Injection
    - A03:2025 - Injection
    references:
    - https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
    - https://www.idontplaydarts.com/2016/04/detecting-curl-pipe-bash-server-side/
    technology:
    - github-actions
    - bash
    - curl
    cwe2021-top25: true
    cwe2022-top25: true
    subcategory:
    - vuln
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
  patterns:
  - pattern-inside: 'steps: [...]'
  - pattern-inside: |
      - run: ...
        ...
  - pattern: 'run: $SHELL'
  - metavariable-pattern:
      language: bash
      metavariable: $SHELL
      patterns:
      - pattern-either:
        - pattern: curl ... | $CMD ...
        - pattern: wget ... | $CMD ...
      - metavariable-regex:
          metavariable: $CMD
          regex: '^(bash|sh|python3?|ruby|perl)$'
  severity: ERROR

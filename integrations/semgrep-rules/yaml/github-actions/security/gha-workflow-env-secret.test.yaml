name: Test gha-workflow-env-secret rule

on:
  push:
    branches: [develop]

# TP: workflow-level env exposes secret to all jobs
env:
  # ruleid: gha-workflow-env-secret
  TOKEN: ${{ secrets.MY_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    # TN: job-level env — inside jobs, not workflow-level
    env:
      # ok: gha-workflow-env-secret
      JOB_TOKEN: ${{ secrets.JOB_SECRET }}
    steps:
      - name: deploy
        # TN: step-level env — most narrowly scoped, preferred
        env:
          # ok: gha-workflow-env-secret
          STEP_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: ./deploy.sh

      - name: build
        run: make build
